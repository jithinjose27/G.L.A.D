ekf_filter_node:
  ros__parameters:
    frequency: 20.0
    two_d_mode: true
    publish_acceleration: false
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # -------------------------------------
    # SOURCE 1: RF2O Laser Odometry
    # -------------------------------------
    # We fuse: Linear Velocity X and Y (indices 6, 7).
    # We IGNORE: Position (0,1) and Rotation (5,11) from RF2O,
    # because we want the IMU to handle all rotation.
    odom0: /odom_rf2o
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false,  false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    # -------------------------------------
    # SOURCE 3: MOTOR_CONTROL (Wheel Encoders)
    # -------------------------------------
    # We fuse: Linear Velocity X (6) and Yaw Velocity (11).
    # We IGNORE: Position (0,1) and Rotation (5).
    # WHY? Because fusing absolute position from wheels causes "jumps" when
    # the wheels slip. We let the EKF integrate the velocity (which is smoother).
    odom1: /motor/odom
    odom1_config: [false, false, false,
                   false, false, false,
                   false,  false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_nodelay: false
    odom1_differential: false
    odom1_relative: false

    # -------------------------------------
    # SOURCE 2: IMU (Madgwick Data)
    # -------------------------------------
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,    # <--- CHANGED: Now fusing Absolute Yaw (Index 5)
                  false, false, false,
                  false, false, true,    # Fusing Yaw Velocity (Index 11)
                  false, false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: false
