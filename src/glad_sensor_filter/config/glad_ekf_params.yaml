/glad_ekf_node:
  ros__parameters:
    frequency: 20.0
    two_d_mode: true
    publish_acceleration: false
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # SOURCE 1: RF2O Laser Odometry
    odom0: /odom_rf2o
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false,  false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    # SOURCE 2: Motor encoders
    odom1: /motor/odom
    odom1_config: [false, false, false,
                   false, false, false,
                   false,  false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_nodelay: false
    odom1_differential: false
    odom1_relative: false

    # SOURCE 3: IMU
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: false
